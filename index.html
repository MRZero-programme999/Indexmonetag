<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <!-- ✅ NEW MONETAG SCRIPT (ONLY THIS ONE) -->

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
        }
        h2 {
            margin-bottom: 30px;
        }

            padding: 12px 25px;

<body>

<div class="container animate__animated animate__fadeIn">
    
    <h2>Watch Ads & Earn</h2>

    <button class="btn btn-primary" onclick="showAd('Ad 1')">Show Ad 1</button>
    <button class="btn btn-success" onclick="showAd('Ad 2')">Show Ad 2</button>
    <button class="btn btn-warning" onclick="showAd('Ad 3')">Show Ad 3</button>
    <button class="btn btn-danger" onclick="showAd('Ad 4')">Show Ad 4</button>

</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<script>
    function showAd(adName) {
        show_10897005()
            .then(() => {
                toastr.success(adName + " watched successfully!", "Success");
            })
            .catch((error) => {
                toastr.error("Ad failed to load", "Error");
                console.error(error);
            });
    }
</script>

</body>
